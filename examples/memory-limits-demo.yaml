name: memory-limits-demo
version: "1.0"

# Demonstrates memory_mb enforcement via wasmtime StoreLimits.
#
# ok-job runs first: allocates 1MB within a 16MB limit → SUCCESS.
# oom-job depends on ok-job: tries to allocate 10MB with a 1MB limit.
#   StoreLimits rejects the instantiation before any user code runs → FAILED.

jobs:
  ok-job:
    component: components/alloc-bomb/target/wasm32-wasip1/debug/alloc_bomb.wasm
    input: "1"
    permissions:
      filesystem:
        read: []
        write: []
      network:
        allow: []
      limits:
        memory_mb: 16
        timeout_secs: 30

  oom-job:
    component: components/alloc-bomb/target/wasm32-wasip1/debug/alloc_bomb.wasm
    input: "10"
    depends_on: [ok-job]
    permissions:
      filesystem:
        read: []
        write: []
      network:
        allow: []
      limits:
        memory_mb: 1
        timeout_secs: 30
